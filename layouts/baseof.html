<!doctype html>
<html lang="en">
  <head>
    <script>
      // Prepare dark theme before loading the css
      // to prevent unnecessary color transition on the start
      switch (localStorage.getItem("theme")) {
        case "dark":
          document.documentElement.classList.add("dark");
          break;
        case null:
          const theme =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          localStorage.setItem("theme", theme);
      }
    </script>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {{ $style := resources.Get "css/main.css" | minify }}
    <link rel="stylesheet" href="{{ $style.Permalink }}" />
    <title>
      {{ block "title" . }}
        {{ .Title }} |
        {{ .Site.Title }}
      {{ end }}
    </title>
  </head>

  <body>
    <nav>
      <div class="elevated box">
        <ul>
          <a href="/" class="logo">
            <b><u>raihan</u>kr</b>
          </a>
          {{- range .Site.Menus.main }}
            <li><a href="{{ .PageRef }}">{{ .Name }}</a></li>
          {{ end }}
        </ul>
      </div>
      <button class="elevated box" onclick="toggleTheme()">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
        >
          <g fill="none">
            <path
              style="fill: var(--fg)"
              d="M2.75 12A9.25 9.25 0 0 0 12 21.25V2.75A9.25 9.25 0 0 0 2.75 12"
            />
            <path
              style="stroke: var(--fg)"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.5"
              d="M12 21.25a9.25 9.25 0 0 0 0-18.5m0 18.5a9.25 9.25 0 0 1 0-18.5m0 18.5V2.75"
            />
          </g>
        </svg>
      </button>
    </nav>

    {{ block "main" . }}
    {{ end }}


    <footer>
      {{ .Site.Copyright }}
    </footer>

    <script>
      function toggleTheme() {
        const isDark = document.documentElement.classList.toggle("dark");
        localStorage.setItem("theme", isDark ? "dark" : "light");
      }
    </script>
  </body>
</html>
